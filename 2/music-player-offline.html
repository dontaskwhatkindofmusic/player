<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music Player">
    <title>Static Music Player (Offline Mode)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #0a0a0a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .library-header {
            padding: 16px;
            border-bottom: 1px solid #333;
        }

        .library-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .library-controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background: #333;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #444;
        }

        .btn.primary {
            background: #1db954;
        }

        .btn.primary:hover {
            background: #1ed760;
        }

        .library-filter {
            padding: 16px;
            border-bottom: 1px solid #333;
        }

        .filter-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
        }

        .filter-input::placeholder {
            color: #666;
        }

        .library-list {
            flex: 1;
            overflow-y: auto;
        }

        .library-item {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .library-item:hover {
            background: #1a1a1a;
        }

        .library-item.active {
            background: #1db954;
        }

        .library-item-title {
            font-weight: 500;
            font-size: 14px;
        }

        .library-item-artist {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .main-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            overflow-y: auto;
        }

        .album-art {
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #1db954 0%, #1aa34a 100%);
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .now-playing-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .now-playing-artist {
            font-size: 18px;
            color: #999;
        }

        .player-controls {
            background: #0a0a0a;
            padding: 20px;
            border-top: 1px solid #333;
        }

        .progress-container {
            margin-bottom: 16px;
        }

        .time-display {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #1db954;
            transition: width 0.1s;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #333;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #444;
        }

        .control-btn.play-pause {
            width: 56px;
            height: 56px;
            background: #1db954;
            font-size: 24px;
        }

        .control-btn.play-pause:hover {
            background: #1ed760;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.6;
        }

        #fileInput {
            display: none;
        }

        .info-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin: 16px;
            font-size: 13px;
            color: #999;
        }

        .info-box strong {
            color: #1db954;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #333;
            }

            .main-content {
                flex-direction: column;
            }

            .album-art {
                width: 160px;
                height: 160px;
                font-size: 48px;
                margin-bottom: 16px;
            }

            .now-playing-title {
                font-size: 20px;
            }

            .now-playing-artist {
                font-size: 14px;
            }
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <!-- Sidebar: Library -->
            <div class="sidebar scrollbar">
                <div class="library-header">
                    <div class="library-title">Library</div>
                    <div class="library-controls">
                        <button class="btn primary" id="selectFilesBtn">📁 Add Songs</button>
                    </div>
                </div>
                <div class="library-filter">
                    <input
                        type="text"
                        class="filter-input"
                        id="searchInput"
                        placeholder="Search songs..."
                    >
                </div>
                <div class="library-list scrollbar" id="libraryList">
                    <div class="empty-state">
                        <div class="empty-state-icon">🎵</div>
                        <div class="empty-state-text">Click "Add Songs" to select audio files</div>
                    </div>
                </div>
            </div>

            <!-- Main Player -->
            <div class="main-player">
                <div class="player-display">
                    <div class="album-art" id="albumArt">🎵</div>
                    <h1 class="now-playing-title" id="nowPlayingTitle">No track selected</h1>
                    <p class="now-playing-artist" id="nowPlayingArtist">—</p>
                </div>
            </div>
        </div>

        <!-- Player Controls -->
        <div class="player-controls">
            <div class="progress-container">
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="controls">
                <button class="control-btn" id="prevBtn" title="Previous">⏮</button>
                <button class="control-btn play-pause" id="playPauseBtn" title="Play/Pause">▶</button>
                <button class="control-btn" id="nextBtn" title="Next">⏭</button>
            </div>
        </div>
    </div>

    <!-- Hidden inputs -->
    <input type="file" id="fileInput" multiple accept="audio/*">
    <audio id="audioPlayer"></audio>

    <script>
        // ============ STATE ============
        const state = {
            songs: [],
            filteredSongs: [],
            currentIndex: -1,
            isPlaying: false,
        };

        const elements = {
            audio: document.getElementById('audioPlayer'),
            playPauseBtn: document.getElementById('playPauseBtn'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            progressBar: document.getElementById('progressBar'),
            progressFill: document.getElementById('progressFill'),
            currentTime: document.getElementById('currentTime'),
            duration: document.getElementById('duration'),
            libraryList: document.getElementById('libraryList'),
            searchInput: document.getElementById('searchInput'),
            selectFilesBtn: document.getElementById('selectFilesBtn'),
            nowPlayingTitle: document.getElementById('nowPlayingTitle'),
            nowPlayingArtist: document.getElementById('nowPlayingArtist'),
            albumArt: document.getElementById('albumArt'),
            fileInput: document.getElementById('fileInput')
        };

        // ============ INITIALIZATION ============
        function init() {
            setupEventListeners();
        }

        // ============ FILE SELECTION ============
        elements.selectFilesBtn.addEventListener('click', () => {
            elements.fileInput.click();
        });

        elements.fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            loadSongs(files);
        });

        function loadSongs(files) {
            state.songs = files.map((file, index) => {
                const title = file.name.replace(/\.[^.]+$/, '');
                return {
                    file,
                    title,
                    artist: 'Unknown Artist',
                    index
                };
            });

            applySearch();
            updateUI();
        }

        // ============ SEARCH ============
        function applySearch() {
            const query = elements.searchInput.value.toLowerCase();
            state.filteredSongs = state.songs.filter(song =>
                song.title.toLowerCase().includes(query) ||
                song.artist.toLowerCase().includes(query)
            );
            updateLibraryUI();
        }

        elements.searchInput.addEventListener('input', applySearch);

        // ============ PLAYBACK ============
        function play() {
            if (state.currentIndex >= 0) {
                elements.audio.play();
                state.isPlaying = true;
                updatePlayButton();
            }
        }

        function pause() {
            elements.audio.pause();
            state.isPlaying = false;
            updatePlayButton();
        }

        function togglePlayPause() {
            if (state.isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function nextTrack() {
            if (state.filteredSongs.length === 0) return;
            state.currentIndex = (state.currentIndex + 1) % state.filteredSongs.length;
            loadTrack(state.currentIndex);
            play();
        }

        function prevTrack() {
            if (state.filteredSongs.length === 0) return;
            state.currentIndex = (state.currentIndex - 1 + state.filteredSongs.length) % state.filteredSongs.length;
            loadTrack(state.currentIndex);
            play();
        }

        function loadTrack(index) {
            if (index < 0 || index >= state.filteredSongs.length) return;

            state.currentIndex = index;
            const song = state.filteredSongs[index];

            const url = URL.createObjectURL(song.file);
            elements.audio.src = url;

            updateNowPlaying(song);
            updateLibraryUI();
        }

        function updateNowPlaying(song) {
            elements.nowPlayingTitle.textContent = song.title;
            elements.nowPlayingArtist.textContent = song.artist;
            elements.albumArt.textContent = '🎵';
        }

        function updatePlayButton() {
            elements.playPauseBtn.textContent = state.isPlaying ? '⏸' : '▶';
        }

        // ============ UI ============
        function updateLibraryUI() {
            if (state.filteredSongs.length === 0) {
                elements.libraryList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">No songs found</div>
                    </div>
                `;
                return;
            }

            elements.libraryList.innerHTML = state.filteredSongs.map((song, index) => {
                const isActive = state.currentIndex === index;
                return `
                    <div class="library-item ${isActive ? 'active' : ''}" onclick="playFromLibrary(${index})">
                        <div class="library-item-title">${song.title}</div>
                        <div class="library-item-artist">${song.artist}</div>
                    </div>
                `;
            }).join('');
        }

        function updateUI() {
            updateLibraryUI();
            updatePlayButton();
        }

        function playFromLibrary(index) {
            loadTrack(index);
            play();
        }

        // ============ EVENT LISTENERS ============
        function setupEventListeners() {
            elements.playPauseBtn.addEventListener('click', togglePlayPause);
            elements.nextBtn.addEventListener('click', nextTrack);
            elements.prevBtn.addEventListener('click', prevTrack);

            // Progress bar
            elements.progressBar.addEventListener('click', (e) => {
                const rect = elements.progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                elements.audio.currentTime = percent * elements.audio.duration;
            });

            // Audio events
            elements.audio.addEventListener('timeupdate', () => {
                const percent = (elements.audio.currentTime / elements.audio.duration) * 100;
                elements.progressFill.style.width = percent + '%';
                elements.currentTime.textContent = formatTime(elements.audio.currentTime);
            });

            elements.audio.addEventListener('loadedmetadata', () => {
                elements.duration.textContent = formatTime(elements.audio.duration);
            });

            elements.audio.addEventListener('ended', nextTrack);

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target === document.body) {
                    e.preventDefault();
                    togglePlayPause();
                }
            });
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Initialize
        init();
    </script>
</body>
</html>
